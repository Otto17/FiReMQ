# Версия релиза (формат "дд.мм.гг")
version = "28.01.26"

# -----------------------------
# 📁 Секция бинарных файлов / ресурсов
# -----------------------------

# Обновление основной исполняемый файл "FiReMQ"
[[files]]
Src     = "FiReMQ"     # Путь внутри архива
DestRel = "FiReMQ"     # Путь относительно исполняемого файла FiReMQ
Action  = "update"     # Обновляем


# Обновление утилиты "ServerUpdater"
[[files]]
Src     = "ServerUpdater"    # Путь внутри архива
DestRel = "ServerUpdater"    # Путь относительно исполняемого файла FiReMQ
Action  = "update"           # Обновляем



# -----------------------------
# ⚙️ Секция конфигурационных файлов
# -----------------------------

# Обновление index.html:
[[configs]]
Key         = "Path_Web_Data"                                 # Имя ключа в "server.conf"
Src         = "data/index.html"                               # Файл берём из архива
DestDefault = "/usr/local/share/firemq/data/index.html"       # Если ключа нет — кладём сюда
Action      = "update"                                        # Обновляем

# Обновление modal.css:
[[configs]]
Key         = "Path_Web_Data"                                 # Имя ключа в "server.conf"
Src         = "data/css/modal.css"                            # Файл берём из архива
DestDefault = "/usr/local/share/firemq/data/css/modal.css"    # Если ключа нет — кладём сюда
Action      = "update"                                        # Обновляем

# Обновление modal.js:
[[configs]]
Key         = "Path_Web_Data"                                 # Имя ключа в "server.conf"
Src         = "data/js/modal.js"                              # Файл берём из архива
DestDefault = "/usr/local/share/firemq/data/js/modal.js"      # Если ключа нет — кладём сюда
Action      = "update"                                        # Обновляем


# =================================================================
# 📚 ДОКУМЕНТАЦИЯ И ПРИМЕРЫ
# =================================================================

# ПРИМЕЧАНИЕ: Абсолютные пути начинаются с '/', например: "/etc/firemq/config/server.conf".

# -----------------------------
# 📁 СЕКЦИЯ БИНАРНЫХ ФАЙЛОВ / РЕСУРСОВ [[files]]
# -----------------------------
# Используется для любых «жёстких» файлов (бинарники, библиотеки, картинки, логи и т.д.), которые не зависят от ключей в главном конфиге "server.conf".
#
# КЛЮЧИ:
#  Src            – путь в архиве (относительно корневой папки "FiReMQ/" в архиве) [пример: "FiReMQ"]
#  DestRel        – путь назначения относительно EXE_DIR (где лежит исполняемый файл "FiReMQ") [пример: "tools/helper"]
#  Dest           – абсолютный (полный) путь (можно использовать вместо "DestRel", с макросами ${EXE_DIR}, ${CONFIG_DIR}) [пример: "${EXE_DIR}/tools/util"]
#  Action=update  – заменить/создать файл (обновление)
#  Action=delete  – удалить файл (по DestRel или Dest)


# ➡️ ПРИМЕРЫ:	
# Удаление файла через секцию [[files]] (без ключа):
# [[files]]
# DestRel = "config/ТЕСТОВЫЙ ФАЙЛ.txt"
# Action  = "delete"

# Удаление лога рядом с бинарным файлом:
# [[files]]
# DestRel = "old_debug.log"
# Action  = "delete"

# Обновление вспомогательной утилиты:
# [[files]]
# Src     = "tools/helper"
# DestRel = "tools/helper"
# Action  = "update"

# Обновление с абсолютным путём:
# [[files]]
# Src  = "tools/util"
# Dest = "${EXE_DIR}/custom/utils/util"
# Action = "update"

# Обновление с полным абсолютным путём:
# [[files]]
# Src  = "tools/util"
# Dest = "/opt/firemq/custom/utils/util"
# Action = "update"


# -----------------------------
# 📂 РАБОТА С КАТАЛОГАМИ [[files]]
# -----------------------------
# Для обновления или удаления каталогов целиком.
#
# ДОПОЛНИТЕЛЬНЫЕ КЛЮЧИ:
#  IsDir             - это каталог? (true - да или false - нет)
#  Replace = true    – удалить старое содержимое каталога перед копированием
#  Replace = false   – только добавить/перезаписать файлы (не удаляя существующие файлы)


# ➡️ ПРИМЕРЫ:
# Полная замена каталога (удалить старое + скопировать новое):
# [[files]]
# Src     = "data/icon"
# DestRel = "data/icon"
# Action  = "update"
# IsDir   = true 			# Это каталог
# Replace = true			# Удалить старое содержимое перед копированием

# Обновление каталога (добавить новые, перезаписать существующие):
# [[files]]
# Src     = "data/locales"
# DestRel = "data/locales"
# Action  = "update"
# IsDir   = true			# Это каталог
# Replace = false			# Не удалять существующие файлы

# Обновление каталога с абсолютным путём:
# [[files]]
# Src     = "plugins"
# Dest    = "/usr/local/share/firemq/plugins"
# Action  = "update"
# IsDir   = true
# Replace = true

# Удаление каталога (автоматически определит, что это каталог):
# [[files]]
# DestRel = "data/deprecated"
# Action  = "delete"

# Удаление каталога с абсолютным путём (автоматически определит, что это каталог):
# [[files]]
# Dest   = "/usr/local/share/firemq/old_data"
# Action = "delete"


# -----------------------------
# ⚙️ СЕКЦИЯ КОНФИГУРАЦИОННЫХ ФАЙЛОВ [[configs]]
# -----------------------------
# Используется для файлов, у которых путь хранится в главном конфиге "server.conf" или для конфигов, которые могут быть перемещены админом вручную.
#
# КЛЮЧИ:
#  Key            – ключ в главном конфиге "server.conf" [пример: Path_Config_MQTT]
#  Src            – путь к файлу внутри архива (относительно корневой папки "FiReMQ/...") — только для update [пример: "config/mqtt_config.json"]
#  DestDefault    – используется, если ключа в главном конфиге "server.conf" нет [пример: "config/mqtt_config.json"]
#  Action=update  – обновить файл (по Key или DestDefault)
#  Action=delete  – удалить файл (по Key или DestDefault)

# ➡️ ПРИМЕРЫ:
# Обновление mqtt-конфига (по ключу):
# [[configs]]
# Key         = "Path_Config_MQTT"
# Src         = "config/mqtt_config.json"
# DestDefault = "config/mqtt_config.json"
# Action      = "update"

# Удаление (по ключу):
# [[configs]]
# Key    = "Key_ChaCha20_Poly1305"
# Action = "delete"

# Удаление произвольного файла (без ключа):
# [[configs]]
# DestDefault = "config/obsolete.json"
# Action      = "delete"

# Добавление нового дефолтного конфига (если его не было ранее):
# [[configs]]
# Key         = "Path_Config_New"
# Src         = "config/new_config.json"
# DestDefault = "config/new_config.json"
# Action      = "update"

# Обновление SSL-сертификата (по ключу):
# [[configs]]
# Key         = "Path_Web_Cert"
# Src         = "cert/server-cert.pem"
# DestDefault = "cert/server-cert.pem"
# Action      = "update"
